<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | AI Podcast</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1DB954, #121212);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.card {
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 20px;
    width: 380px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    text-align: center;
}

.card h2 {
    color: #1DB954;
    margin-bottom: 10px;
}

.subtitle {
    color: #ccc;
    margin-bottom: 25px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 25px;
    border: none;
    background: #1e1e1e;
    color: white;
    outline: none;
    box-sizing: border-box;
    transition: 0.3s;
}

input:focus {
    background: #2a2a2a;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 25px;
    border: none;
    background: #1DB954;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1ed760;
    transform: scale(1.02);
}

.message {
    margin-top: 15px;
    color: #ccc;
    font-size: 14px;
    min-height: 20px;
}

.link {
    margin-top: 20px;
}

.link a {
    color: #1DB954;
    text-decoration: none;
}

.link a:hover {
    text-decoration: underline;
}

.password-box {
    position: relative;
}

.password-box input {
    padding-right: 60px;
}

#togglePassword {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #ccc;
    font-size: 14px;
    user-select: none;
}

#togglePassword:hover {
    color: #1DB954;
}

</style>
</head>

<body>

<div class="card">

    <h2>🔑 Forgot Password</h2>

    <p class="subtitle">
        Reset your AI Podcast account password
    </p>

    <!-- Email -->
    <input
        type="email"
        id="email"
        placeholder="Enter your registered email"
        required
    >

    <!-- Send OTP -->
    <button onclick="sendOTP()">
        Send OTP
    </button>

    <!-- OTP -->
    <input
        type="text"
        id="otp"
        placeholder="Enter OTP"
    >

    <!-- Verify OTP -->
    <button onclick="verifyOTP()">
        Verify OTP
    </button>

    <!-- New Password -->
    <div class="password-box">

        <input
            type="password"
            id="newPassword"
            placeholder="Enter New Password"
        >

        <span id="togglePassword">
            Show
        </span>

    </div>

    <!-- Reset Password -->
    <button onclick="resetPassword()">
        Reset Password
    </button>

    <div class="message" id="message"></div>

    <div class="link">
        <a href="/login">← Back to Login</a>
    </div>

</div>

<script>

const messageBox = document.getElementById("message");

// Show / Hide Password
const passwordInput = document.getElementById("newPassword");
const togglePassword = document.getElementById("togglePassword");

togglePassword.addEventListener("click", () => {

    if (passwordInput.type === "password") {

        passwordInput.type = "text";
        togglePassword.textContent = "Hide";

    } else {

        passwordInput.type = "password";
        togglePassword.textContent = "Show";
    }
});

// Send OTP
async function sendOTP() {

    const email =
        document.getElementById("email").value.trim();

    if (!email) {

        messageBox.innerText =
            "Please enter your email.";

        return;
    }

    try {

        const response = await fetch(
            "/otp/forgot-password",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email
                })
            }
        );

        const data = await response.json();

        messageBox.innerText =
            data.message || data.error;

    } catch (error) {

        messageBox.innerText =
            "Failed to connect to server.";
    }
}

// Verify OTP
async function verifyOTP() {

    const email =
        document.getElementById("email").value.trim();

    const otp =
        document.getElementById("otp").value.trim();

    if (!otp) {

        messageBox.innerText =
            "Please enter OTP.";

        return;
    }

    try {

        const response = await fetch(
            "/otp/verify-otp",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    otp: otp
                })
            }
        );

        const data = await response.json();

        messageBox.innerText =
            data.message || data.error;

    } catch (error) {

        messageBox.innerText =
            "Failed to connect to server.";
    }
}

// Reset Password
async function resetPassword() {

    const email =
        document.getElementById("email").value.trim();

    const newPassword =
        document.getElementById("newPassword").value.trim();

    if (!newPassword) {

        messageBox.innerText =
            "Please enter a new password.";

        return;
    }

    try {

        const response = await fetch(
            "/otp/reset-password",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    new_password: newPassword
                })
            }
        );

        const data = await response.json();

        if (response.ok) {

            alert(
                "Password updated successfully!"
            );

            window.location.href = "/login";

        } else {

            messageBox.innerText =
                data.error;
        }

    } catch (error) {

        messageBox.innerText =
            "Failed to connect to server.";
    }
}

</script>

</body>
</html>
